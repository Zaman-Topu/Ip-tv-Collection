<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Bug TV - Free Live IPTV Player. Watch Bangladesh, India, Sports, News live." />
  <meta name="theme-color" content="#09090b" />
  <title>Bug TV — Live IPTV</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./player.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.0/dist/hls.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#09090b;--bg2:#111113;--bg3:#18181b;
      --border:rgba(255,255,255,0.07);
      --red:#ff0055;--text:#f1f1f1;--muted:#6b7280;
      --font:'Inter',system-ui,sans-serif;
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
    img{display:block}
    button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
    a{color:inherit;text-decoration:none}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:99px}

    /* ── Navbar ── */
    #nav{
      position:fixed;top:0;left:0;right:0;z-index:300;
      display:flex;align-items:center;gap:12px;
      padding:0 16px;height:52px;
      background:rgba(9,9,11,0.97);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .logo{
      display:flex;align-items:center;gap:7px;cursor:pointer;flex-shrink:0;
    }
    .logo-badge{
      background:var(--red);color:#fff;font-size:11px;font-weight:700;
      padding:3px 8px;border-radius:5px;letter-spacing:2px;
    }
    .live-dot{
      display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
      color:var(--red);letter-spacing:1px;
    }
    .live-dot::before{
      content:'';width:6px;height:6px;border-radius:50%;
      background:var(--red);animation:blink 1.5s ease infinite;
    }
    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
    .nav-stat{
      margin-left:auto;font-size:11px;font-weight:600;color:var(--muted);
      padding:3px 10px;border:1px solid var(--border);border-radius:99px;
      white-space:nowrap;
    }
    #stat-c{color:var(--red)}

    /* ── Main layout ── */
    #app{padding-top:52px}
    .wrap{max-width:1500px;margin:0 auto;padding:8px 10px}

    /* ═══════════════════════════════════════════
       PLAYER — Premium YouTube style
    ═══════════════════════════════════════════ */
    #player-wrap{display:none;margin-bottom:15px;animation:fadeUp .3s ease-out}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    #player-wrap.show{display:block}

    #player-layout{
      display:flex;flex-direction:column;gap:0;
      background:rgba(20,20,24,0.6);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:14px;overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    }
    @media(min-width:1024px){
      #player-layout{flex-direction:row;align-items:flex-start;gap:0}
    }

    /* ── Left column: video + info ── */
    #player-left{
      flex:1;min-width:0;
      border-right:1px solid rgba(255,255,255,0.05);
    }

    /* Video container */
    #vbox{
      position:relative;width:100%;
      background:#000;
      box-shadow:0 4px 20px rgba(0,0,0,0.6);
    }
    #vbox::before{content:'';display:block;padding-top:56.25%}
    #vid-player {
      position: absolute !important;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    /* Error overlay */
    #p-err{
      display:none;position:absolute;inset:0;z-index:6;
      background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
      flex-direction:column;align-items:center;justify-content:center;
      gap:10px;padding:20px;text-align:center;
    }
    #p-err.show{display:flex}
    #p-err .err-icon{font-size:42px;text-shadow:0 0 20px rgba(255,0,85,0.5)}
    #p-err h3{font-size:16px;color:var(--red);font-weight:700}
    #p-err p{font-size:12px;color:#cbd5e1;max-width:280px;line-height:1.6}
    #btn-proxy{
      background:linear-gradient(45deg, #ff0055, #ff2a75);color:#fff;
      font-size:12px;font-weight:700;padding:8px 18px;border-radius:8px;
      margin-top:6px;border:none;box-shadow:0 4px 15px rgba(255,0,85,0.3);
      transition:transform .15s, box-shadow .15s;
    }
    #btn-proxy:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,0,85,0.4)}

    /* Close button */
    #p-close{
      position:absolute;top:10px;right:10px;z-index:10;
      background:rgba(0,0,0,0.5);color:#fff;backdrop-filter:blur(5px);
      width:34px;height:34px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:15px;transition:all .2s;
      border:1px solid rgba(255,255,255,0.15);
    }
    #p-close:hover{background:var(--red);border-color:var(--red);transform:scale(1.05)}

    /* ── Info bar below video ── */
    #p-info-bar{
      padding:16px;display:flex;align-items:center;gap:14px;
    }
    #pi-logo{
      width:60px;height:40px;object-fit:contain;
      border-radius:8px;background:rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.08);
      flex-shrink:0;padding:4px;
    }
    #pi-text{flex:1;min-width:0}
    #pi-title{
      font-size:18px;font-weight:800;line-height:1.2;
      overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
      text-shadow:0 2px 4px rgba(0,0,0,0.5);
    }
    #pi-sub{
      display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;
    }
    .pi-tag{
      font-size:10px;font-weight:700;color:#94a3b8;
      padding:3px 8px;background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.05);border-radius:5px;
    }

    /* ── Right column: queue ── */
    #queue-col{
      width:100%;
      background:var(--bg2);border:1px solid var(--border);
      border-radius:10px;overflow:hidden;
      max-height: 350px;
      display: flex;
      flex-direction: column;
    }
    @media(min-width:1024px){
      #queue-col{width:330px;flex-shrink:0;max-height:600px;}
    }
    .q-head{
      padding:10px 14px;font-size:11px;font-weight:700;color:var(--muted);
      letter-spacing:1px;border-bottom:1px solid var(--border);
      background:var(--bg2);display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
    }
    #q-list{overflow-y:auto;flex:1}
    .qi{
      display:flex;align-items:center;gap:10px;
      padding:9px 14px;border-bottom:1px solid var(--border);
      cursor:pointer;transition:background .1s;
    }
    .qi:last-child{border-bottom:none}
    .qi:hover{background:rgba(255,255,255,0.04)}
    .qi.on{border-left:3px solid var(--red);background:rgba(255,0,85,0.06);padding-left:11px}
    .qi-thumb{
      width:48px;height:30px;object-fit:contain;flex-shrink:0;
      border-radius:4px;background:#000;border:1px solid var(--border);
    }
    .qi-info{flex:1;min-width:0}
    .qi-n{font-size:12px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .qi-s{font-size:10px;color:var(--muted);margin-top:2px}

    /* ═══════════════════════════════════════════
       FILTERS
    ═══════════════════════════════════════════ */
    #filters{
      background:var(--bg2);border:1px solid var(--border);
      border-radius:10px;padding:10px;margin-bottom:10px;
    }
    .f-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:7px}
    .f-row:last-child{margin-bottom:0}

    .srch-w{position:relative;flex:1;min-width:160px}
    .srch-w svg{
      position:absolute;left:10px;top:50%;transform:translateY(-50%);
      width:13px;height:13px;fill:var(--muted);pointer-events:none;
    }
    #srch{
      width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);
      padding:7px 10px 7px 30px;border-radius:7px;font-size:12px;font-family:var(--font);
      outline:none;transition:border-color .15s;
    }
    #srch:focus{border-color:rgba(255,0,85,.5)}

    .fsel{
      background:var(--bg3);border:1px solid var(--border);color:var(--text);
      padding:7px 10px;border-radius:7px;font-size:11px;font-family:var(--font);
      outline:none;cursor:pointer;transition:border-color .15s;
    }
    .fsel:focus{border-color:rgba(255,0,85,.5)}

    #breset{
      border:1px solid var(--border);color:var(--muted);
      font-size:10px;font-weight:700;padding:5px 10px;border-radius:6px;
      transition:all .15s;
    }
    #breset:hover{border-color:var(--red);color:var(--red)}

    /* Scrollable pill rows */
    .f-row.scroll{flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
    .f-row.scroll::-webkit-scrollbar{display:none}

    .pill{
      background:var(--bg3);border:1px solid var(--border);color:var(--muted);
      font-size:10px;font-weight:600;padding:4px 10px;border-radius:99px;
      transition:all .15s;white-space:nowrap;cursor:pointer;flex-shrink:0;
    }
    .pill:hover{border-color:rgba(255,0,85,.4);color:var(--text)}
    .pill.on{background:var(--red);border-color:var(--red);color:#fff}

    /* ═══════════════════════════════════════════
       CHANNEL GRID
    ═══════════════════════════════════════════ */
    #grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
      gap:7px;
    }
    @media(max-width:400px){#grid{grid-template-columns:repeat(3,1fr);gap:5px}}
    @media(min-width:800px){#grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}

    .card{
      position:relative;background:var(--bg2);border:1px solid var(--border);
      border-radius:9px;overflow:hidden;cursor:pointer;
      transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease;
      display:flex;flex-direction:column;aspect-ratio:16/11;
    }
    .card:hover{
      transform:translateY(-2px);
      border-color:rgba(255,0,85,0.35);
      box-shadow:0 8px 24px rgba(0,0,0,.4);
    }
    .card:active{transform:scale(0.97)}

    .c-img{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:8px;overflow:hidden;background:var(--bg2);
    }
    .c-img img{max-width:100%;max-height:46px;object-fit:contain}
    .c-info{padding:4px 6px 5px;border-top:1px solid var(--border)}
    .c-name{
      font-size:9px;font-weight:700;overflow:hidden;white-space:nowrap;
      text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.3px;
    }
    .c-sub{font-size:8px;color:var(--muted);margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

    .badge{
      position:absolute;top:4px;left:4px;font-size:8px;font-weight:700;
      padding:2px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;
      pointer-events:none;
    }
    .b-live{background:var(--red);color:#fff}
    .b-bdix{background:#2563eb;color:#fff}
    .b-geo{background:#b45309;color:#fff}

    /* Loading / empty */
    .g-msg{
      grid-column:1/-1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;min-height:200px;gap:10px;
      color:var(--muted);font-size:12px;font-weight:600;
    }
    .spin{
      width:34px;height:34px;border:3px solid var(--border);
      border-top-color:var(--red);border-radius:50%;
      animation:spin .7s linear infinite;
    }

    /* Pagination */
    #pages{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0}
    .pgb{
      background:var(--bg2);border:1px solid var(--border);color:var(--muted);
      font-size:11px;font-weight:700;padding:6px 14px;border-radius:7px;transition:all .15s;
    }
    .pgb:hover:not(:disabled){border-color:var(--red);color:var(--red)}
    .pgb:disabled{opacity:.3;cursor:default}
    .pgi{font-size:11px;font-weight:700;color:var(--muted)}
  </style>
</head>
<body>

<!-- Navbar -->
<nav id="nav">
  <div class="logo" onclick="location.reload()">
    <span class="logo-badge">BUG TV</span>
    <span class="live-dot">LIVE</span>
  </div>
  <div class="nav-stat"><span id="stat-c">0</span> / <span id="stat-t">0</span> Channels</div>
</nav>

<div id="app">
<div class="wrap">

  <!-- ── PLAYER (YouTube style) ── -->
  <div id="player-wrap">
    <div id="player-layout">

      <!-- Left: video + info -->
      <div id="player-left">
        <div id="vbox">
          <video-player class="media-default-skin media-default-skin--video" id="vid-player">
            <video-skin>
              <video id="vid" playsinline preload="auto"></video>
            </video-skin>
          </video-player>
          <div id="p-err">
            <div class="err-icon">📡</div>
            <h3>Stream Unavailable</h3>
            <p id="err-txt">This channel is offline or geo-restricted.</p>
            <button id="btn-proxy">↻ Retry with Proxy</button>
          </div>
          <button id="p-close" title="Close Player">✕</button>
        </div>

        <!-- Info below video -->
        <div id="p-info-bar">
          <img id="pi-logo" src="" alt="" />
          <div id="pi-text">
            <div id="pi-title">—</div>
            <div id="pi-sub">
              <span class="pi-tag" id="pi-country">—</span>
              <span class="pi-tag" id="pi-cat">—</span>
            </div>
          </div>
          <!-- Quality Selector -->
          <div id="quality-wrap" style="display:none; align-items:center; gap:6px;">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="var(--muted)"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            <select id="sel-quality" class="fsel" style="background:var(--bg3); font-weight:600;">
              <option value="-1">Auto Quality</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Right: related queue -->
      <div id="queue-col">
        <div class="q-head">
          <span>RELATED</span>
          <span id="q-cnt" style="color:var(--red)">0</span>
        </div>
        <div id="q-list"></div>
      </div>

    </div>
  </div>

  <!-- Filters -->
  <div id="filters">
    <div class="f-row">
      <div class="srch-w">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="search" id="srch" placeholder="Search channel..." autocomplete="off" />
      </div>
      <select class="fsel" id="sel-db">
        <option value="active">⚡ Active Only</option>
        <option value="geo">🌍 Geo-Blocked</option>
        <option value="complete" selected>📺 All TV Channels</option>
      </select>
      <select class="fsel" id="sel-cat"><option value="all">All Categories</option></select>
      <button id="breset">✕ Reset</button>
    </div>
    <div class="f-row scroll" id="cpills"></div>
    <div class="f-row scroll" id="qpills"></div>
  </div>

  <!-- Grid -->
  <div id="grid"><div class="g-msg"><div class="spin"></div><span>Loading channels...</span></div></div>
  <div id="pages"></div>

</div>
</div>

<script type="module" src="/main.js"></script>
</body>
</html>
