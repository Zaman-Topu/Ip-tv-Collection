<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Bug TV - Free Live IPTV Player. Watch Bangladesh, India, Sports, News live." />
  <meta name="theme-color" content="#09090b" />
  <title>Bug TV — Live IPTV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#09090b;--bg2:#111113;--bg3:#18181b;
      --border:rgba(255,255,255,0.08);
      --red:#ff0055;--text:#f3f4f6;--muted:#71717a;
      --font:'Inter',system-ui,sans-serif;
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
    img{display:block}
    button{font-family:var(--font);cursor:pointer;border:none;background:none}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:99px}

    /* ─── Navbar ─── */
    #nav{
      position:fixed;top:0;left:0;right:0;z-index:200;
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 16px;
      background:rgba(9,9,11,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }
    .logo-badge{background:var(--red);color:#fff;font-size:12px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:2px;cursor:pointer}
    .nav-mid{display:flex;align-items:center;gap:8px}
    .live-badge{font-size:10px;font-weight:700;color:var(--red);letter-spacing:1px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .nav-stat{font-size:11px;font-weight:600;color:var(--muted);padding:3px 10px;border:1px solid var(--border);border-radius:99px}
    #stat-c{color:var(--red)}

    /* ─── Layout ─── */
    #app{padding-top:56px}
    .wrap{max-width:1400px;margin:0 auto;padding:10px 10px}

    /* ─── Inline compact player ─── */
    #player-section{
      display:none;
      gap:8px;
      margin-bottom:10px;
      align-items:flex-start;
    }
    #player-section.show{display:flex;flex-direction:column}
    @media(min-width:860px){
      #player-section.show{flex-direction:row}
    }

    /* Video box */
    #vbox{
      position:relative;
      flex:0 0 auto;
      width:100%;
      background:#000;border-radius:10px;overflow:hidden;
      border:1px solid var(--border);
    }
    @media(min-width:860px){#vbox{width:420px;max-width:420px}}
    #vbox::before{content:'';display:block;padding-top:56.25%}
    #vid{position:absolute;inset:0;width:100%;height:100%;background:#000}
    
    #p-err{
      display:none;position:absolute;inset:0;z-index:5;
      background:rgba(0,0,0,0.93);flex-direction:column;
      align-items:center;justify-content:center;gap:6px;padding:16px;text-align:center;
    }
    #p-err.show{display:flex}
    #p-err h3{font-size:13px;color:var(--red);font-weight:700}
    #p-err p{font-size:11px;color:var(--muted);max-width:260px;line-height:1.5}
    .proxy-btn{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;margin-top:4px}

    #p-close{
      position:absolute;top:7px;right:7px;z-index:10;
      background:rgba(0,0,0,0.7);color:#fff;width:28px;height:28px;
      border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;
      transition:background .15s;border:1px solid var(--border);
    }
    #p-close:hover{background:var(--red)}

    /* Channel info + queue beside video */
    #player-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
    #p-info{
      background:var(--bg2);border:1px solid var(--border);border-radius:8px;
      padding:10px;display:flex;align-items:center;gap:10px;flex-shrink:0;
    }
    #pi-logo{width:44px;height:28px;object-fit:contain;border-radius:3px;background:#000}
    #pi-title{font-size:13px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    #pi-meta{font-size:10px;color:var(--muted);margin-top:2px}

    #queue-box{
      background:var(--bg2);border:1px solid var(--border);border-radius:8px;
      overflow:hidden;flex:1;max-height:180px;overflow-y:auto;
    }
    @media(min-width:860px){#queue-box{max-height:220px}}
    .q-hdr{padding:7px 10px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:2}
    .qi{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
    .qi:hover{background:var(--bg3)}
    .qi.on{border-left:2px solid var(--red);background:var(--bg3)}
    .qi img{width:32px;height:20px;object-fit:contain;border-radius:2px;background:#000;flex-shrink:0}
    .qi-n{font-size:11px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

    /* ─── Filters ─── */
    #filters{
      background:var(--bg2);border:1px solid var(--border);
      border-radius:10px;padding:10px;margin-bottom:10px;
    }
    .f-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}
    .f-row:last-child{margin-bottom:0}

    .srch-w{position:relative;flex:1;min-width:160px}
    .srch-w svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;fill:var(--muted);pointer-events:none}
    #srch{
      width:100%;background:var(--bg3);border:1px solid var(--border);
      color:var(--text);padding:7px 10px 7px 29px;
      border-radius:7px;font-size:12px;font-family:var(--font);
      outline:none;transition:border-color .15s;
    }
    #srch:focus{border-color:var(--red)}

    .fsel{
      background:var(--bg3);border:1px solid var(--border);color:var(--text);
      padding:7px 10px;border-radius:7px;font-size:11px;font-family:var(--font);
      outline:none;cursor:pointer;transition:border-color .15s;max-width:160px;
    }
    .fsel:focus{border-color:var(--red)}

    .pill{
      background:var(--bg3);border:1px solid var(--border);color:var(--muted);
      font-size:10px;font-weight:700;padding:4px 9px;border-radius:99px;
      transition:all .15s;white-space:nowrap;letter-spacing:0.3px;
    }
    .pill:hover{border-color:var(--red);color:var(--text)}
    .pill.on{background:var(--red);border-color:var(--red);color:#fff}

    #breset{
      background:none;border:1px solid var(--border);color:var(--muted);
      font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;
      transition:all .15s;letter-spacing:0.5px;
    }
    #breset:hover{border-color:var(--red);color:var(--red)}

    /* ─── Grid ─── */
    #grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
      gap:7px;
    }
    @media(max-width:420px){#grid{grid-template-columns:repeat(3,1fr);gap:5px}}

    .card{
      position:relative;background:var(--bg2);border:1px solid var(--border);
      border-radius:9px;overflow:hidden;cursor:pointer;
      transition:transform .15s,border-color .15s;
      display:flex;flex-direction:column;aspect-ratio:16/11;
    }
    .card:hover{transform:translateY(-2px);border-color:rgba(255,0,85,0.4)}
    .card:active{transform:scale(0.97)}

    .c-img{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;overflow:hidden}
    .c-img img{max-width:100%;max-height:44px;object-fit:contain}
    .c-info{padding:4px 5px 5px;border-top:1px solid var(--border)}
    .c-name{font-size:9px;font-weight:700;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:0.3px}
    .c-sub{font-size:8px;color:var(--muted);margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

    .badge{position:absolute;top:4px;left:4px;font-size:8px;font-weight:700;padding:2px 4px;border-radius:3px;text-transform:uppercase;letter-spacing:0.3px}
    .b-live{background:var(--red);color:#fff}
    .b-bdix{background:#3b82f6;color:#fff}
    .b-geo{background:#ca8a04;color:#fff}

    /* ─── Loading/Empty ─── */
    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;gap:10px;color:var(--muted);font-size:12px;font-weight:600;grid-column:1/-1}
    .spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ─── Pagination ─── */
    #pages{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px 0}
    .pgb{background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;padding:6px 12px;border-radius:7px;transition:all .15s}
    .pgb:hover:not(:disabled){border-color:var(--red);color:var(--red)}
    .pgb:disabled{opacity:.3;cursor:default}
    .pgi{font-size:11px;font-weight:700;color:var(--muted)}
  </style>
</head>
<body>

<nav id="nav">
  <div class="nav-mid">
    <span class="logo-badge" onclick="location.reload()">BUG TV</span>
    <span class="live-badge">● LIVE</span>
  </div>
  <div class="nav-stat"><span id="stat-c">0</span> / <span id="stat-t">0</span> Channels</div>
</nav>

<div id="app">
<div class="wrap">

  <!-- Player -->
  <div id="player-section">
    <div id="vbox">
      <video id="vid" playsinline controls></video>
      <div id="p-err">
        <h3>Stream Unavailable</h3>
        <p id="err-txt">This stream is offline or geo-blocked.</p>
        <button class="proxy-btn" id="btn-proxy">Retry with Proxy</button>
      </div>
      <button id="p-close">✕</button>
    </div>
    <div id="player-right">
      <div id="p-info">
        <img id="pi-logo" src="" alt="" />
        <div>
          <div id="pi-title">-</div>
          <div id="pi-meta">-</div>
        </div>
      </div>
      <div id="queue-box">
        <div class="q-hdr">RELATED — <span id="q-cnt">0</span></div>
        <div id="q-list"></div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div id="filters">
    <div class="f-row">
      <div class="srch-w">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="search" id="srch" placeholder="Search channel..." autocomplete="off" />
      </div>
      <select class="fsel" id="sel-db">
        <option value="active">⚡ Active Only</option>
        <option value="geo">🌍 Geo-Blocked</option>
        <option value="complete" selected>📚 All TV Channels</option>
      </select>
      <select class="fsel" id="sel-cat"><option value="all">All Categories</option></select>
      <button id="breset">✕ Reset</button>
    </div>
    <div class="f-row" id="cpills"></div>
    <div class="f-row" id="qpills"></div>
  </div>

  <!-- Grid -->
  <div id="grid"><div id="loading"><div class="spin"></div><span>Loading channels...</span></div></div>
  <div id="pages"></div>

</div>
</div>

<script type="module" src="/main.js"></script>
</body>
</html>
